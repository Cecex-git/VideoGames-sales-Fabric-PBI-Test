find_replace:
  - find_value: "00000000-0000-0000-0000-000000000000"
    replace_value:
      dev: "__FABRIC_SOURCE_WORKSPACE_ID__"
      prod: "__FABRIC_SOURCE_WORKSPACE_ID__"

  - find_value: "11111111-1111-1111-1111-111111111111"
    replace_value:
      dev: "__FABRIC_SOURCE_LAKEHOUSE_ID__"
      prod: "__FABRIC_SOURCE_LAKEHOUSE_ID__"

  - find_value: "VideoGameSalesRaw"
    replace_value:
      dev: "__FABRIC_SOURCE_TABLE_NAME__"
      prod: "__FABRIC_SOURCE_TABLE_NAME__"

semantic_model_binding:
  models:
    - semantic_model_name: "VideoGameSales"
      connection_id:
        dev: "__FABRIC_SEMANTIC_MODEL_CONNECTION_ID__"
        prod: "__FABRIC_SEMANTIC_MODEL_CONNECTION_ID__"


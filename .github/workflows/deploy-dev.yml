name: Deploy PBIP to Fabric Dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          allow-no-subscriptions: true

      - name: Verify Fabric CLI
        shell: pwsh
        run: fab --version

      - name: Deploy PBIP
        shell: pwsh
        env:
          FABRIC_DEV_WORKSPACE: ${{ vars.FABRIC_DEV_WORKSPACE }}
          FABRIC_SOURCE_WORKSPACE_ID: ${{ secrets.FABRIC_DEV_SOURCE_WORKSPACE_ID }}
          FABRIC_SOURCE_LAKEHOUSE_ID: ${{ secrets.FABRIC_DEV_SOURCE_LAKEHOUSE_ID }}
          FABRIC_SOURCE_TABLE_NAME: ${{ secrets.FABRIC_DEV_SOURCE_TABLE_NAME }}
        run: |
          if (-not $env:FABRIC_DEV_WORKSPACE) {
            throw "Repository/environment variable FABRIC_DEV_WORKSPACE is not set."
          }

          if (-not $env:FABRIC_SOURCE_WORKSPACE_ID) {
            throw "GitHub secret FABRIC_DEV_SOURCE_WORKSPACE_ID is not set."
          }

          if (-not $env:FABRIC_SOURCE_LAKEHOUSE_ID) {
            throw "GitHub secret FABRIC_DEV_SOURCE_LAKEHOUSE_ID is not set."
          }

          if (-not $env:FABRIC_SOURCE_TABLE_NAME) {
            throw "GitHub secret FABRIC_DEV_SOURCE_TABLE_NAME is not set."
          }

          python -u deploy.py --spn-auth --workspace-name "$env:FABRIC_DEV_WORKSPACE" --environment dev


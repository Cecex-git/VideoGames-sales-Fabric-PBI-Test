name: Promote PBIP Dev to Prod

on:
  workflow_dispatch:

jobs:
  promote:
    runs-on: windows-latest
    environment: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Azure CLI login
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          if (-not $env:AZURE_CLIENT_ID) {
            throw "GitHub secret AZURE_CLIENT_ID is not set."
          }

          if (-not $env:AZURE_CLIENT_SECRET) {
            throw "GitHub secret AZURE_CLIENT_SECRET is not set."
          }

          if (-not $env:AZURE_TENANT_ID) {
            throw "GitHub secret AZURE_TENANT_ID is not set."
          }

          az login --service-principal --username "$env:AZURE_CLIENT_ID" --password "$env:AZURE_CLIENT_SECRET" --tenant "$env:AZURE_TENANT_ID" --allow-no-subscriptions

      - name: Verify Fabric CLI
        shell: pwsh
        run: fab --version

      - name: Deploy PBIP to Fabric Prod
        shell: pwsh
        env:
          FABRIC_PROD_WORKSPACE: ${{ vars.FABRIC_PROD_WORKSPACE }}
          FABRIC_SOURCE_WORKSPACE_ID: ${{ secrets.FABRIC_PROD_SOURCE_WORKSPACE_ID }}
          FABRIC_SOURCE_LAKEHOUSE_ID: ${{ secrets.FABRIC_PROD_SOURCE_LAKEHOUSE_ID }}
          FABRIC_SOURCE_TABLE_NAME: ${{ secrets.FABRIC_PROD_SOURCE_TABLE_NAME }}
          FABRIC_SEMANTIC_MODEL_CONNECTION_ID: ${{ secrets.FABRIC_PROD_CONNECTION_ID }}
        run: |
          if (-not $env:FABRIC_PROD_WORKSPACE) {
            throw "Repository/environment variable FABRIC_PROD_WORKSPACE is not set."
          }

          if (-not $env:FABRIC_SOURCE_WORKSPACE_ID) {
            throw "GitHub secret FABRIC_PROD_SOURCE_WORKSPACE_ID is not set."
          }

          if (-not $env:FABRIC_SOURCE_LAKEHOUSE_ID) {
            throw "GitHub secret FABRIC_PROD_SOURCE_LAKEHOUSE_ID is not set."
          }

          if (-not $env:FABRIC_SOURCE_TABLE_NAME) {
            throw "GitHub secret FABRIC_PROD_SOURCE_TABLE_NAME is not set."
          }

          if (-not $env:FABRIC_SEMANTIC_MODEL_CONNECTION_ID) {
            throw "GitHub secret FABRIC_PROD_CONNECTION_ID is not set."
          }

          python -u deploy.py --spn-auth --workspace-name "$env:FABRIC_PROD_WORKSPACE" --environment prod
